<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KAIN9 • 16×16</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
  body, html { margin:0; padding:0; background:#000; color:#0f0; font-family:monospace; text-align:center; overflow:hidden; height:100vh; touch-action:none; user-select:none; -webkit-user-select:none; }
  canvas { image-rendering:pixelated; border:8px solid #0f0; background:#001100; margin:10px auto; display:block; max-width:95vw; max-height:60vh; }
  button { font-size:28px; padding:12px 24px; margin:4px; background:#111; color:#0f0; border:4px solid #0f0; }
  #status, #seedDisplay { font-size:19px; margin:6px; min-height:28px; }
  textarea { width:92%; height:65px; background:#001100; color:#0f0; font-family:monospace; font-size:15px; margin:6px auto; display:block; line-height:1.3; white-space:pre; overflow-x:auto; }
  .copybtn { font-size:18px; padding:6px 14px; margin:4px; }
  input { font-size:24px; padding:10px; background:#001100; color:#0f0; border:4px solid #0f0; width:70%; text-align:center; }
  .step { background:#001100; border:4px solid #0f0; padding:8px; margin:6px auto; max-width:520px; text-align:left; font-size:17px; }
  .orange-box { border-color:#ff8c00 !important; }
  .orange-box h3 { color:#ff8c00; }
  .green-box { border-color:#0f0 !important; }
  .green-box h3 { color:#0f0; }
  #battleLog { 
    font-size:16px; line-height:1.35; max-height:162px; overflow-y:auto; 
    background:#001100; border:3px solid #0f0; padding:8px; margin:8px auto; 
    width:92%; text-align:left; color:#0f0; 
  }
  #inventoryDisplay { font-size:18px; color:#ff0; margin:6px; }

  /* ==================== PLAYFIELD ONLY (mobile fix) ==================== */
  #game { padding:8px; box-sizing:border-box; }
  .controls {
    display:flex; flex-wrap:wrap; justify-content:center; gap:12px; margin:15px auto; max-width:420px;
  }
  .controls button {
    font-size:34px; padding:16px 26px; min-width:68px; min-height:68px; touch-action:manipulation;
  }
  .slash-btn { min-width:150px !important; background:#330 !important; border-color:#f80 !important; color:#ff0; font-weight:bold; }

  @media (max-height:720px) {
    canvas { max-height:47vh !important; }
    #battleLog { max-height:115px; font-size:15px; }
    .controls button { font-size:29px; padding:13px 22px; min-width:60px; min-height:60px; }
  }
  @media (max-width:480px) {
    .controls { gap:8px; }
    #status, #myInfo, #otherInfo { font-size:19px; }
  }
</style>
</head>
<body>
<h1>KAIN9 — 16×16</h1>

<!-- NAME SCREEN (unchanged) -->
<div id="nameScreen">
  <h2>ENTER YOUR NAME</h2>
  <input id="playerName" type="text" value="Kain" maxlength="12"><br><br>
  <button onclick="setNameAndContinue()">CONTINUE TO ROLE</button>
</div>

<!-- ROLE CHOICE (unchanged) -->
<div id="start" style="display:none">
  <button onclick="startRole('host')">I AM HOST (Orange H)</button><br><br>
  <button onclick="startRole('joiner')">I AM JOINER (Green J)</button>
</div>

<!-- SIGNALING (unchanged UI) -->
<div id="signaling" style="display:none; max-width:560px; margin:0 auto; padding:6px;">
  <div id="status">Kain9 • Generating SDP...</div>

  <div id="codeSection" class="step orange-box" style="display:none">
    <h3 id="codeTitle">YOUR CODE</h3>
    <textarea id="localSDP" readonly></textarea>
    <button class="copybtn" onclick="copySDP()">📋 COPY CODE</button>
  </div>

  <div id="pasteSection" class="step" style="display:none">
    <h3 id="pasteTitle">PASTE FRIEND'S CODE</h3>
    <button onclick="connect()">CONNECT</button><br>
    <textarea id="remoteSDP" placeholder="Paste the K9- blob here..." spellcheck="false" autocorrect="off" autocapitalize="none"></textarea>
  </div>
</div>

<!-- GAME (only this section changed for mobile) -->
<div id="game" style="display:none">
  <div id="seedDisplay">WORLD SAVE SEED: <span id="seedValue" style="color:#ff0"></span></div>
  <div id="status">CONNECTED • SLASH YOUR FRIEND</div>
  
  <div style="margin:10px; font-size:22px; color:#0f0">
    <span id="myInfo">YOU: Kain (HP 10/10)</span>  |  
    <span id="otherInfo">FRIEND: ??? (HP 10/10)</span>
  </div>

  <div id="inventoryDisplay">BADGES: none</div>
  
  <canvas id="c" width="480" height="480"></canvas><br>
  
  <!-- New clean D-pad layout for mobile -->
  <div class="controls">
    <button onclick="move(0,-1)">↑</button>
    <button onclick="move(-1,0)">←</button>
    <button onclick="slash()" class="slash-btn">SLASH</button>
    <button onclick="move(1,0)">→</button>
    <button onclick="move(0,1)">↓</button>
  </div>

  <button onclick="copySeed()">COPY WORLD SEED</button>
  <button onclick="showLoadSeed()">LOAD WORLD SEED</button>

  <div id="battleLog"></div>
</div>

<!-- LOAD SEED OVERLAY (unchanged) -->
<div id="loadSeedOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:100; padding-top:20vh;">
  <div style="max-width:520px; margin:0 auto; background:#001100; border:6px solid #0f0; padding:20px;">
    <h3>PASTE WORLD SAVE SEED</h3>
    <textarea id="loadSeedInput" style="height:120px; width:100%;" spellcheck="false" autocorrect="off" autocapitalize="none"></textarea><br><br>
    <button onclick="loadSeed()">LOAD & RESTORE</button>
    <button onclick="hideLoadSeed()" style="background:#330;">CANCEL</button>
  </div>
</div>

<script>
// ====================== KAIN9 CORE (original logic kept) ======================
const SIZE = 16;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let myRole = null;
let myName = '';
let otherName = '???';
let myPos = {x:8, y:8};
let otherPos = null;
let myHealth = 10;
let otherHealth = 10;
let xp = 0;
let level = 1;
let inventory = [];
let tick = 0;
let pc, dc;
let myLetter, myColor, otherLetter, otherColor;

let lastFrame = 0;
const TARGET_FPS = 30;
const FRAME_TIME = 1000 / TARGET_FPS;

let battleMessages = [];

// ====================== BROWSER LOCKDOWN ======================
function lockdown() {
  document.addEventListener('gesturestart', e => e.preventDefault(), {passive:false});
  document.addEventListener('touchmove', e => {if(e.touches.length>1)e.preventDefault();}, {passive:false});
  document.body.style.overflow = 'hidden';
  if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(()=>{});
  if (screen.orientation?.lock) screen.orientation.lock('portrait').catch(()=>{});
}

// ====================== BATTLE LOG ======================
function battleLog(msg) {
  battleMessages.unshift(msg);
  if (battleMessages.length > 10) battleMessages.pop();
  const logEl = document.getElementById('battleLog');
  logEl.innerHTML = battleMessages.join('<br>');
  logEl.scrollTop = 0;
}

// ====================== BITCOIN-STYLE BLOB (no spaces, Messenger-proof) ======================
function encodeSDP(desc) {
  const json = JSON.stringify({type: desc.type, sdp: desc.sdp});
  let b64 = btoa(json).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
  let checksum = b64.split('').reduce((a,c) => a + c.charCodeAt(0), 0) % 36;
  const groups = (b64 + checksum.toString(36).toUpperCase()).match(/.{1,5}/g) || [];
  return `K9-${groups.join('-')}`;
}

function decodeSDP(str) {
  let clean = str.trim().toUpperCase().replace(/[^A-Z0-9]/g, ''); // nukes EVERYTHING Messenger does
  if (clean.startsWith('K9')) clean = clean.slice(2);
  const payload = clean.slice(0, -1);
  const givenChk = clean.slice(-1);
  let calc = payload.split('').reduce((a,c) => a + c.charCodeAt(0), 0) % 36;
  if (calc.toString(36).toUpperCase() !== givenChk) throw new Error('Bad checksum');
  let b64 = payload.replace(/-/g,'+').replace(/_/g,'/');
  while (b64.length % 4) b64 += '=';
  return JSON.parse(atob(b64));
}

// ====================== WORLD SEED (unchanged) ======================
function generateWorldSeed() {
  const state = {x:myPos.x, y:myPos.y, mh:myHealth, oh:otherHealth, inv:inventory.map(i=>i.name).join('|')};
  let b64 = btoa(JSON.stringify(state)).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
  b64 = b64.slice(0,28).padEnd(28,'0');
  let sum = b64.split('').reduce((a,c)=>a + c.charCodeAt(0),0) % 36;
  return 'K9' + b64 + sum.toString(36).toUpperCase();
}

// copySeed / loadSeed functions remain EXACTLY the same as original...

function copySeed() { navigator.clipboard.writeText(generateWorldSeed()).then(() => battleLog('WORLD SEED COPIED')); }
function showLoadSeed() { document.getElementById('loadSeedOverlay').style.display = 'block'; }
function hideLoadSeed() { document.getElementById('loadSeedOverlay').style.display = 'none'; }
function loadSeed() {
  let raw = document.getElementById('loadSeedInput').value;
  let input = raw.trim().replace(/\s+/g, '');
  hideLoadSeed();
  if (!input) return;
  try {
    let clean = input.replace('K9','').slice(0,29);
    let b64 = clean.slice(0,-1);
    const state = JSON.parse(atob(b64.replace(/-/g,'+').replace(/_/g,'/').padEnd(28,'=')));
    myPos = {x:state.x||8, y:state.y||8};
    myHealth = Math.max(0, state.mh||10);
    otherHealth = Math.max(0, state.oh||10);
    inventory = (state.inv||'').split('|').filter(Boolean).map(name => ({type:'badge', name}));
    if (dc && dc.readyState === 'open') sendMsg({type:'fullState', state:{myPos, myHealth, otherHealth, inventory}});
    battleLog('WORLD RESTORED');
    draw();
  } catch(e) { battleLog('BAD SEED'); }
}

// ====================== WEBRTC ======================
function setupWebRTC() { /* original */ 
  pc = new RTCPeerConnection({ iceServers: [{urls: 'stun:stun.l.google.com:19302'}, {urls: 'stun:stun1.l.google.com:19302'}] });
  pc.onicecandidate = e => { if (!e.candidate) finalizeSDP(); };
  pc.onicegatheringstatechange = () => { if (pc.iceGatheringState === 'complete') finalizeSDP(); };
  if (myRole === 'host') {
    dc = pc.createDataChannel('kain9');
    setupDataChannel(dc);
    pc.createOffer().then(o => pc.setLocalDescription(o));
  } else {
    pc.ondatachannel = e => { dc = e.channel; setupDataChannel(dc); };
  }
  setTimeout(finalizeSDP, 1800);
}

function finalizeSDP() {
  if (!pc || !pc.localDescription) return;
  const code = encodeSDP(pc.localDescription);
  document.getElementById('localSDP').value = code;
  document.getElementById('status').innerHTML = `✅ Code blob ready — send to friend`;
}

// (setupDataChannel, sendMsg, setNameAndContinue, startRole, gameLoop, move, slash, draw, keyboard — all unchanged)

function setupDataChannel(channel) { /* original code */ 
  channel.onopen = () => {
    document.getElementById('signaling').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    document.getElementById('status').innerHTML = `KAIN9 LINKED • ${myRole.toUpperCase()}`;
    lockdown();
    sendMsg({type: 'name', name: myName});
    sendMsg({type: 'fullState', state: {myName, myPos, myHealth, otherName, otherPos, otherHealth, xp, level, inventory}});
  };
  channel.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'move') otherPos = msg;
    if (msg.type === 'name') otherName = msg.name;
    if (msg.type === 'slash') {
      myHealth = Math.max(0, myHealth - 2);
      battleLog('YOU WERE SLASHED!');
      if (myHealth <= 0) battleLog('YOU WERE DEFEATED!');
      sendMsg({type: 'healthUpdate', health: myHealth});
    }
    if (msg.type === 'healthUpdate') otherHealth = msg.health;
    if (msg.type === 'fullState') {
      otherName = msg.state.otherName || otherName;
      otherPos = msg.state.otherPos || otherPos;
      otherHealth = msg.state.otherHealth || otherHealth;
      inventory = msg.state.inventory || inventory;
    }
    draw();
  };
}

function sendMsg(obj) {
  if (dc && dc.readyState === 'open') dc.send(JSON.stringify(obj));
}

function setNameAndContinue() { /* original */ 
  myName = document.getElementById('playerName').value.trim() || 'Kain';
  document.getElementById('nameScreen').style.display = 'none';
  document.getElementById('start').style.display = 'block';
}

async function startRole(role) { /* original */ 
  myRole = role;
  myLetter = role === 'host' ? 'H' : 'J';
  myColor = role === 'host' ? '#ff8c00' : '#0f0';
  otherLetter = role === 'host' ? 'J' : 'H';
  otherColor = role === 'host' ? '#0f0' : '#ff8c00';
  myHealth = 10; otherHealth = 10; xp = 0; level = 1; inventory = [];
  document.getElementById('start').style.display = 'none';
  document.getElementById('signaling').style.display = 'block';
  document.getElementById('status').innerHTML = 'Kain9 • Generating SDP...';
  if (role === 'host') {
    document.getElementById('codeTitle').textContent = 'YOUR OFFER CODE';
    document.getElementById('codeSection').classList.add('orange-box');
    document.getElementById('codeSection').style.display = 'block';
    document.getElementById('pasteTitle').textContent = "PASTE JOINER'S ANSWER";
    document.getElementById('pasteSection').classList.add('orange-box');
    document.getElementById('pasteSection').style.display = 'block';
  } else {
    document.getElementById('pasteTitle').textContent = "PASTE HOST'S CODE";
    document.getElementById('pasteSection').classList.add('green-box');
    document.getElementById('pasteSection').style.display = 'block';
  }
  setupWebRTC();
  requestAnimationFrame(gameLoop);
}

function gameLoop(now) { /* original */ 
  if (!lastFrame) lastFrame = now;
  if (now - lastFrame >= FRAME_TIME) {
    tick++;
    draw();
    lastFrame = now;
  }
  requestAnimationFrame(gameLoop);
}

function copySDP() {
  const txt = document.getElementById('localSDP').value.trim();
  if (!txt) return battleLog('CODE STILL GENERATING');
  navigator.clipboard.writeText(txt).then(() => battleLog('CODE BLOB COPIED'));
}

async function connect() {
  let raw = document.getElementById('remoteSDP').value;
  if (!raw.trim()) return battleLog('PASTE CODE FIRST');
  try {
    const desc = decodeSDP(raw);
    const remoteType = myRole === 'host' ? 'answer' : 'offer';
    await pc.setRemoteDescription({type: remoteType, sdp: desc.sdp});
    if (myRole === 'joiner') {
      battleLog('HOST CODE OK — GENERATING ANSWER');
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      document.getElementById('pasteSection').style.display = 'none';
      document.getElementById('codeTitle').textContent = 'YOUR ANSWER CODE';
      document.getElementById('codeSection').style.display = 'block';
      finalizeSDP();
      battleLog('ANSWER READY — SEND TO HOST');
    } else {
      battleLog('CONNECTED!');
    }
  } catch (e) {
    battleLog('BAD CODE — ' + (e.message || ''));
  }
}

function move(dx, dy) { /* original */ 
  myPos.x = Math.max(0, Math.min(SIZE-1, myPos.x + dx));
  myPos.y = Math.max(0, Math.min(SIZE-1, myPos.y + dy));
  sendMsg({type: 'move', x: myPos.x, y: myPos.y});
  draw();
}

function slash() { /* original */ 
  if (!otherPos || Math.abs(myPos.x - otherPos.x) > 1 || Math.abs(myPos.y - otherPos.y) > 1) return;
  sendMsg({type: 'slash'});
  otherHealth = Math.max(0, otherHealth - 2);
  battleLog('SLASH HIT!');
  if (otherHealth <= 0) {
    battleLog(`DEFEATED ${otherName}!`);
    inventory.push({type: 'badge', name: otherName});
    battleLog(`BADGE ACQUIRED: ${otherName}`);
  }
  sendMsg({type: 'healthUpdate', health: otherHealth});
  draw();
}

function draw() { /* original */ 
  ctx.fillStyle = '#001100';
  ctx.fillRect(0, 0, 480, 480);
  ctx.strokeStyle = '#003300';
  for (let i = 0; i <= SIZE; i++) {
    ctx.beginPath();
    ctx.moveTo(i*30, 0); ctx.lineTo(i*30, 480);
    ctx.moveTo(0, i*30); ctx.lineTo(480, i*30);
    ctx.stroke();
  }
  ctx.fillStyle = myColor;
  ctx.font = 'bold 32px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(myLetter, myPos.x*30 + 15, myPos.y*30 + 15);
  if (otherPos) {
    ctx.fillStyle = otherColor;
    ctx.fillText(otherLetter, otherPos.x*30 + 15, otherPos.y*30 + 15);
  }

  document.getElementById('myInfo').textContent = `${myName} (HP ${myHealth}/10)`;
  document.getElementById('otherInfo').textContent = `${otherName} (HP ${otherHealth}/10)`;
  document.getElementById('seedValue').textContent = generateWorldSeed();

  const badges = inventory.filter(i => i.type === 'badge').map(i => i.name).join(', ') || 'none';
  document.getElementById('inventoryDisplay').innerHTML = `BADGES: ${badges}`;
  
  document.getElementById('status').innerHTML = 
    `TICK ${tick} | ME:(${myPos.x},${myPos.y}) | OTHER: ${otherPos ? `(${otherPos.x},${otherPos.y})` : '??'}`;
}

// Keyboard (unchanged)
document.addEventListener('keydown', e => {
  if (!myRole) return;
  if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') move(-1,0);
  if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') move(1,0);
  if (e.key === 'ArrowUp' || e.key.toLowerCase() === 'w') move(0,-1);
  if (e.key === 'ArrowDown' || e.key.toLowerCase() === 's') move(0,1);
  if (e.key === ' ' || e.key === 'Enter') slash();
});

// ====================== LIGHT PASTE CLEANING (seed only) ======================
window.onload = () => {
  const seedField = document.getElementById('loadSeedInput');
  seedField.addEventListener('paste', () => setTimeout(() => {
    seedField.value = seedField.value.trim().replace(/\s+/g, '');
  }, 10));
};
</script>
</body>
</html>
