<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KAIN9 • 16×16</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
  body, html { margin:0; padding:0; background:#000; color:#0f0; font-family:monospace; text-align:center; overflow:hidden; height:100vh; touch-action:none; user-select:none; -webkit-user-select:none; }
  canvas { image-rendering:pixelated; border:8px solid #0f0; background:#001100; margin:10px auto; display:block; max-width:95vw; max-height:60vh; }
  button { font-size:28px; padding:14px 28px; margin:6px; background:#111; color:#0f0; border:4px solid #0f0; }
  #status, #seedDisplay { font-size:19px; margin:8px; min-height:32px; }
  textarea { width:92%; height:160px; background:#001100; color:#0f0; font-family:monospace; font-size:15px; margin:8px auto; display:block; line-height:1.4; }
  .copybtn { font-size:18px; padding:8px 16px; margin:4px; }
  input { font-size:24px; padding:10px; background:#001100; color:#0f0; border:4px solid #0f0; width:70%; text-align:center; }
  .step { background:#001100; border:4px solid #0f0; padding:14px; margin:12px auto; max-width:520px; text-align:left; font-size:17px; }
  .orange-box { border-color:#ff8c00 !important; }
  .orange-box h3 { color:#ff8c00; }
  .green-box { border-color:#0f0 !important; }
  .green-box h3 { color:#0f0; }
</style>
</head>
<body>
<h1>KAIN9 — 16×16</h1>

<!-- NAME SCREEN -->
<div id="nameScreen">
  <h2>ENTER YOUR NAME</h2>
  <input id="playerName" type="text" value="Kain" maxlength="12"><br><br>
  <button onclick="setNameAndContinue()">CONTINUE TO ROLE</button>
</div>

<!-- ROLE CHOICE -->
<div id="start" style="display:none">
  <button onclick="startRole('host')">I AM HOST (Orange H)</button><br><br>
  <button onclick="startRole('joiner')">I AM JOINER (Green J)</button>
</div>

<!-- SIGNALING – CLEAN LINEAR FLOW -->
<div id="signaling" style="display:none; max-width:560px; margin:0 auto; padding:10px;">
  <div id="status">Kain9 • Generating SDP...</div>

  <!-- HOST OFFER / JOINER ANSWER (both orange) -->
  <div id="codeSection" class="step orange-box" style="display:none">
    <h3 id="codeTitle">YOUR CODE</h3>
    <textarea id="localSDP" readonly></textarea>
    <button class="copybtn" onclick="copySDP()">📋 COPY CODE</button>
  </div>

  <!-- JOINER PASTE HOST CODE (green) -->
  <div id="pasteSection" class="step green-box" style="display:none">
    <h3>PASTE HOST'S CODE</h3>
    <textarea id="remoteSDP" placeholder="Paste the grouped code from your friend..."></textarea><br>
    <button onclick="connect()">CONNECT</button>
  </div>

</div>

<!-- GAME -->
<div id="game" style="display:none">
  <div id="seedDisplay">WORLD SAVE SEED: <span id="seedValue" style="color:#ff0"></span></div>
  <div id="status">CONNECTED • SLASH YOUR FRIEND</div>
  
  <div style="margin:10px; font-size:22px; color:#0f0">
    <span id="myInfo">YOU: Kain (HP 10/10)</span>  |  
    <span id="otherInfo">FRIEND: ??? (HP 10/10)</span>
  </div>
  
  <canvas id="c" width="480" height="480"></canvas><br>
  
  <button onclick="move(-1,0)">←</button>
  <button onclick="move(0,-1)">↑</button>
  <button onclick="move(0,1)">↓</button>
  <button onclick="move(1,0)">→</button>
  <button onclick="slash()" style="margin-left:30px">SLASH</button><br><br>
  
  <button onclick="copySeed()">COPY WORLD SEED</button>
  <button onclick="showLoadSeed()">LOAD WORLD SEED</button>
</div>

<!-- LOAD SEED OVERLAY -->
<div id="loadSeedOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:100; padding-top:20vh;">
  <div style="max-width:520px; margin:0 auto; background:#001100; border:6px solid #0f0; padding:20px;">
    <h3>PASTE WORLD SAVE SEED</h3>
    <textarea id="loadSeedInput" style="height:120px; width:100%;"></textarea><br><br>
    <button onclick="loadSeed()">LOAD & RESTORE</button>
    <button onclick="hideLoadSeed()" style="background:#330;">CANCEL</button>
  </div>
</div>

<script>
// ====================== KAIN9 CORE ======================
const SIZE = 16;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let myRole = null;
let myName = '';
let otherName = '???';
let myPos = {x:8, y:8};
let otherPos = null;
let myHealth = 10;
let otherHealth = 10;
let xp = 0;
let level = 1;
let inventory = [];
let tick = 0;
let pc, dc;
let myLetter, myColor, otherLetter, otherColor;

// ====================== BROWSER LOCKDOWN ======================
function lockdown() {
  document.addEventListener('gesturestart', e => e.preventDefault(), {passive:false});
  document.addEventListener('touchmove', e => {if(e.touches.length>1)e.preventDefault();}, {passive:false});
  document.body.style.overflow = 'hidden';
  if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(()=>{});
  if (screen.orientation?.lock) screen.orientation.lock('portrait').catch(()=>{});
}

// ====================== SIMPLE SDP ======================
function encodeSDP(desc) {
  const json = JSON.stringify({type: desc.type, sdp: desc.sdp});
  const b64 = btoa(json);
  return b64.match(/.{1,40}/g).join(' ');
}
function decodeSDP(str) {
  const b64 = str.replace(/\s/g, '');
  const json = atob(b64);
  return JSON.parse(json);
}

// ====================== WORLD SAVE SEED ======================
function generateWorldSeed() {
  const state = {myName, myPos, myHealth, otherName, otherPos, otherHealth, xp, level, inventory};
  const b64 = btoa(JSON.stringify(state));
  return 'K9SEED-' + b64.match(/.{1,30}/g).join('-');
}

function copySeed() {
  navigator.clipboard.writeText(generateWorldSeed()).then(() => alert('WORLD SEED COPIED — save this!'));
}
function showLoadSeed() { document.getElementById('loadSeedOverlay').style.display = 'block'; }
function hideLoadSeed() { document.getElementById('loadSeedOverlay').style.display = 'none'; }
function loadSeed() {
  let input = document.getElementById('loadSeedInput').value.trim();
  hideLoadSeed();
  if (!input) return;
  try {
    let clean = input.replace('K9SEED-', '').replace(/-/g, '');
    const state = JSON.parse(atob(clean));
    myName = state.myName || myName;
    myPos = state.myPos || myPos;
    myHealth = Math.max(0, state.myHealth || 10);
    otherName = state.otherName || otherName;
    otherPos = state.otherPos || otherPos;
    otherHealth = Math.max(0, state.otherHealth || 10);
    xp = state.xp || 0;
    level = state.level || 1;
    inventory = state.inventory || [];
    document.getElementById('seedValue').textContent = generateWorldSeed().slice(0,40)+'…';
    if (dc && dc.readyState === 'open') sendMsg({type:'fullState', state});
    draw();
    alert('WORLD RESTORED!');
  } catch(e) { alert('Bad seed — check every character'); }
}

// ====================== WEBRTC ======================
function setupWebRTC() {
  pc = new RTCPeerConnection({
    iceServers: [{urls: 'stun:stun.l.google.com:19302'}, {urls: 'stun:stun1.l.google.com:19302'}]
  });

  pc.onicecandidate = e => { if (!e.candidate) finalizeSDP(); };
  pc.onicegatheringstatechange = () => { if (pc.iceGatheringState === 'complete') finalizeSDP(); };

  if (myRole === 'host') {
    dc = pc.createDataChannel('kain9');
    setupDataChannel(dc);
    pc.createOffer().then(o => pc.setLocalDescription(o));
  } else {
    pc.ondatachannel = e => { dc = e.channel; setupDataChannel(dc); };
  }
  setTimeout(finalizeSDP, 1800);
}

function finalizeSDP() {
  if (!pc || !pc.localDescription) return;
  const code = encodeSDP(pc.localDescription);
  document.getElementById('localSDP').value = code;
  document.getElementById('status').innerHTML = `✅ Code ready — send to friend`;
}

function setupDataChannel(channel) {
  channel.onopen = () => {
    document.getElementById('signaling').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    document.getElementById('status').innerHTML = `KAIN9 LINKED • ${myRole.toUpperCase()}`;
    lockdown();
    sendMsg({type: 'name', name: myName});
    sendMsg({type: 'fullState', state: {myName, myPos, myHealth, otherName, otherPos, otherHealth, xp, level, inventory}});
    setInterval(() => { tick++; draw(); }, 180);
  };
  channel.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'move') otherPos = msg;
    if (msg.type === 'name') otherName = msg.name;
    if (msg.type === 'slash') { myHealth = Math.max(0, myHealth - 2); sendMsg({type: 'healthUpdate', health: myHealth}); }
    if (msg.type === 'healthUpdate') otherHealth = msg.health;
    if (msg.type === 'fullState') {
      otherName = msg.state.otherName || otherName;
      otherPos = msg.state.otherPos || otherPos;
      otherHealth = msg.state.otherHealth || otherHealth;
    }
    draw();
  };
}

function sendMsg(obj) {
  if (dc && dc.readyState === 'open') dc.send(JSON.stringify(obj));
}

// ====================== NAME & ROLE ======================
function setNameAndContinue() {
  myName = document.getElementById('playerName').value.trim() || 'Kain';
  document.getElementById('nameScreen').style.display = 'none';
  document.getElementById('start').style.display = 'block';
}

async function startRole(role) {
  myRole = role;
  myLetter = role === 'host' ? 'H' : 'J';
  myColor = role === 'host' ? '#ff8c00' : '#0f0';
  otherLetter = role === 'host' ? 'J' : 'H';
  otherColor = role === 'host' ? '#0f0' : '#ff8c00';

  myHealth = 10; otherHealth = 10; xp = 0; level = 1; inventory = [];

  document.getElementById('start').style.display = 'none';
  document.getElementById('signaling').style.display = 'block';
  document.getElementById('status').innerHTML = 'Kain9 • Generating SDP...';

  // Reset sections
  document.getElementById('codeSection').style.display = 'none';
  document.getElementById('pasteSection').style.display = 'none';

  if (role === 'host') {
    // Host flow: only orange offer box
    document.getElementById('codeTitle').textContent = 'YOUR OFFER CODE';
    document.getElementById('codeSection').classList.add('orange-box');
    document.getElementById('codeSection').style.display = 'block';
  } else {
    // Joiner flow: first green paste box
    document.getElementById('pasteSection').style.display = 'block';
  }

  setupWebRTC();
  requestAnimationFrame(draw);
}

function copySDP() {
  const txt = document.getElementById('localSDP').value;
  if (!txt) return alert('Wait — code is still generating');
  navigator.clipboard.writeText(txt).then(() => {
    const b = document.querySelector('.copybtn');
    const old = b.textContent; b.textContent = '✅ COPIED';
    setTimeout(() => b.textContent = old, 1400);
  });
}

async function connect() {
  let input = document.getElementById('remoteSDP').value.trim();
  if (!input) return alert('Paste the host code first');

  try {
    const desc = decodeSDP(input);
    await pc.setRemoteDescription({type: 'offer', sdp: desc.sdp});
    document.getElementById('status').innerHTML = 'Host code accepted — generating your answer...';

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);

    // Switch to answer view
    document.getElementById('pasteSection').style.display = 'none';
    document.getElementById('codeTitle').textContent = 'YOUR ANSWER CODE';
    document.getElementById('codeSection').classList.add('orange-box');
    document.getElementById('codeSection').style.display = 'block';
    finalizeSDP();   // show the answer code immediately

  } catch (e) {
    alert('Bad code — double-check every character');
  }
}

// ====================== GAMEPLAY ======================
function move(dx, dy) {
  myPos.x = Math.max(0, Math.min(SIZE-1, myPos.x + dx));
  myPos.y = Math.max(0, Math.min(SIZE-1, myPos.y + dy));
  sendMsg({type: 'move', x: myPos.x, y: myPos.y});
  draw();
}

function slash() {
  sendMsg({type: 'slash'});
  if (otherPos && Math.abs(myPos.x - otherPos.x) <= 1 && Math.abs(myPos.y - otherPos.y) <= 1) {
    otherHealth = Math.max(0, otherHealth - 2);
    sendMsg({type: 'healthUpdate', health: otherHealth});
    if (otherHealth <= 0) alert('YOU SLASHED THEM DOWN! VICTORY!');
    draw();
  }
}

function draw() {
  ctx.fillStyle = '#001100';
  ctx.fillRect(0, 0, 480, 480);
  ctx.strokeStyle = '#003300';
  for (let i = 0; i <= SIZE; i++) {
    ctx.beginPath();
    ctx.moveTo(i*30, 0); ctx.lineTo(i*30, 480);
    ctx.moveTo(0, i*30); ctx.lineTo(480, i*30);
    ctx.stroke();
  }
  ctx.fillStyle = myColor;
  ctx.font = 'bold 32px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(myLetter, myPos.x*30 + 15, myPos.y*30 + 15);
  if (otherPos) {
    ctx.fillStyle = otherColor;
    ctx.fillText(otherLetter, otherPos.x*30 + 15, otherPos.y*30 + 15);
  }

  document.getElementById('myInfo').textContent = `${myName} (HP ${myHealth}/10)`;
  document.getElementById('otherInfo').textContent = `${otherName} (HP ${otherHealth}/10)`;
  document.getElementById('seedValue').textContent = generateWorldSeed().slice(0,45)+'…';
  
  tick++;
  document.getElementById('status').innerHTML = 
    `TICK ${tick} | ME:(${myPos.x},${myPos.y}) | OTHER: ${otherPos ? `(${otherPos.x},${otherPos.y})` : '??'}`;
}

document.addEventListener('keydown', e => {
  if (!myRole) return;
  if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') move(-1,0);
  if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') move(1,0);
  if (e.key === 'ArrowUp' || e.key.toLowerCase() === 'w') move(0,-1);
  if (e.key === 'ArrowDown' || e.key.toLowerCase() === 's') move(0,1);
  if (e.key === ' ' || e.key === 'Enter') slash();
});
</script>
</body>
</html>
